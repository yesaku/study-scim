spring:
  application:
    name: study-scim

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:scimdb}
    username: ${DB_USERNAME:scim}
    password: ${DB_PASSWORD:scim}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health

scim:
  base-url: ${SCIM_BASE_URL:http://localhost:8080}
  bearer-token: ${SCIM_BEARER_TOKEN:changeme}
